<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RANGO</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body>

    <section id="hero-section">

        <div class="contact-title">
            <h1>Contact</h1>

            <div class="arrow">
                <i class="fa fa-chevron-down"></i>
                <i class="fa fa-chevron-down"></i>
            </div>

        </div>

    </section>


    <section id="hero-content">

        <div class="map">

            <iframe src="https://www.google.com/maps?q=arevalo&output=embed">
            </iframe>

        </div>

    </section>



    <section class="contact-section">

        <div class="container">

            <div class="left">

                <h2>Leave a reply</h2>

                <form>

                    <div class="form">

                        <div class="input-box">
                            <label>First Name</label>
                            <input type="text">
                        </div>

                        <div class="input-box">
                            <label>Email</label>
                            <input type="email">
                        </div>

                    </div>


                    <div class="input-box full">
                        <label>Subject</label>
                        <input type="text">
                    </div>

                    <div class="input-box full">
                        <label>Message</label>
                        <textarea rows="4"></textarea>
                    </div>

                    <button class="send-btn">SEND REPLY</button>

                </form>

            </div>



            <div class="right">

                <h2>Contact info</h2>

                <h1 class="logo">Ran<span>GO</span></h1>

                <p>
                    Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                    Cras vitae enim enim. Sed nec dignissim purus.
                </p>

                <div class="info">

                    <div class="icon">i</div>

                    <div class="details">

                        <p>C/ Libertad, 34</p>
                        <p>05200 Arévalo</p>

                        <br>

                        <p>0034 37483 2445 322</p>

                        <br>

                        <p>hello@company.com</p>

                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
